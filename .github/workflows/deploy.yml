name: 🚀 SSH Deploy (git pull on DomainFactory)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: 🔧 Run git pull on server
    runs-on: ubuntu-latest

    steps:
      - name: Diagnose SSH network
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -x
      
          echo "DNS:"
          getent ahosts "$SSH_HOST" || true
      
          echo "IPv4 addresses:"
          getent ahostsv4 "$SSH_HOST" || true
      
          echo "IPv6 addresses:"
          getent ahostsv6 "$SSH_HOST" || true
      
          echo "TCP test via IPv4:"
          nc -4 -vz -w 10 "$SSH_HOST" "${SSH_PORT:-22}" || true
      
          echo "SSH verbose test:"
          ssh -4 -vvv \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -p "${SSH_PORT:-22}" \
            "$SSH_HOST" \
            exit || true
      - name: ✅ Checkout repo
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via ssh and git pull
        run: |
          ssh -t -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ForwardAgent=no -o ForwardX11=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

#           command disabled because it is in authorized_keys
#            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
#            "cd ${{ secrets.SSH_WORKDIR }} && git pull"
